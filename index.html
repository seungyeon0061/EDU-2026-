<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세계 분쟁 지역 학습 가이드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f0f2f5;
        }

        /* 지도 컨테이너 및 핀 스타일 */
        .map-container {
            position: relative;
            background-color: #aadaff; /* 바다 색상 */
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            aspect-ratio: 16 / 9;
        }

        .world-map-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%) brightness(1.1);
        }

        .marker {
            position: absolute;
            cursor: pointer;
            transition: transform 0.3s ease, color 0.3s ease;
            z-index: 10;
        }

        .marker:hover {
            transform: scale(1.3);
            color: #ef4444; /* hover 시 빨간색 */
        }

        .marker-pulse {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(239, 68, 68, 0.4);
            border-radius: 50%;
            transform: translate(-25%, -25%);
            animation: pulse 2s infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* 정보 패널 애니메이션 */
        .info-panel {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .active-marker {
            color: #ef4444 !important;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- 헤더 -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl md:text-4xl font-bold text-slate-800 mb-2">
                <i class="fa-solid fa-earth-americas text-blue-600 mr-2"></i>세계 분쟁 지역 인터랙티브 지도
            </h1>
            <p class="text-slate-600">지도의 핀을 클릭하여 현재 진행 중인 세계 주요 분쟁의 현황과 원인을 알아보세요.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- 지도 영역 -->
            <div class="lg:col-span-2">
                <div class="map-container" id="mapArea">
                    <!-- 지도 이미지 (SVG 형태의 세계 지도를 대체로 사용) -->
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg" alt="세계 지도" class="world-map-img">
                    
                    <!-- 핀 (데이터에 기반해 JS로 생성) -->
                    <div id="markersLayer"></div>
                </div>
                <p class="mt-4 text-sm text-slate-500 italic text-center">
                    * 위 지도는 학습용 간략 지도로 실제 지형 및 경계와 차이가 있을 수 있습니다.
                </p>
            </div>

            <!-- 정보 표시 영역 -->
            <div class="lg:col-span-1">
                <div id="infoPanel" class="info-panel bg-white rounded-2xl p-6 shadow-lg h-full border border-slate-200">
                    <div id="emptyState" class="flex flex-col items-center justify-center h-full text-center space-y-4">
                        <i class="fa-solid fa-location-dot text-5xl text-slate-300"></i>
                        <p class="text-slate-500 font-medium">지도의 핀을 클릭하면<br>상세 정보가 나타납니다.</p>
                    </div>

                    <div id="contentState" class="hidden">
                        <div class="flex items-center space-y-1 mb-4">
                            <span id="regionTag" class="bg-red-100 text-red-600 text-xs font-bold px-2.5 py-1 rounded-full uppercase mr-2">중동</span>
                            <h2 id="conflictTitle" class="text-2xl font-bold text-slate-800">분쟁 제목</h2>
                        </div>
                        
                        <div class="space-y-6">
                            <section>
                                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">현재 상황</h3>
                                <p id="currentStatus" class="text-slate-700 leading-relaxed"></p>
                            </section>

                            <section>
                                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">주요 원인</h3>
                                <ul id="mainCauses" class="list-disc list-inside text-slate-700 space-y-1"></ul>
                            </section>

                            <section class="bg-blue-50 p-4 rounded-xl">
                                <h3 class="text-sm font-bold text-blue-800 mb-1"><i class="fa-solid fa-lightbulb mr-1"></i> 핵심 요약</h3>
                                <p id="summary" class="text-sm text-blue-900"></p>
                            </section>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 분쟁 지역 데이터 (고등학교 수준 요약)
        const conflicts = [
            {
                id: 'ukraine',
                title: '러시아-우크라이나 전쟁',
                region: '유럽',
                top: '28%',
                left: '58%',
                status: '2022년 러시아의 전면 침공으로 시작되었습니다. 현재 동부 전선을 중심으로 치열한 소모전이 지속되고 있으며, 에너지 위기와 식량 문제를 야기하는 등 전 세계적인 영향을 미치고 있습니다.',
                causes: ['북대서양조약기구(NATO)의 동진 정책 반대', '러시아의 영향력 확대 시도', '우크라이나의 친서방 정책'],
                summary: '냉전 이후 유럽에서 발생한 가장 큰 규모의 무력 충돌로, 국제 질서의 거대한 변화를 가져오고 있습니다.'
            },
            {
                id: 'gaza',
                title: '이스라엘-하마스 전쟁',
                region: '중동',
                top: '42%',
                left: '56%',
                status: '2023년 하마스의 공격과 이스라엘의 반격으로 가자지구에서 심각한 인도주의적 위기가 발생했습니다. 주변 국가인 레바논(헤즈볼라)과 이란 등으로 갈등이 확산될 우려가 있습니다.',
                causes: ['영토 소유권 및 정착촌 문제', '역사적·종교적 갈등', '팔레스타인 국가 수립 문제'],
                summary: '수십 년간 이어진 이스라엘-팔레스타인 분쟁의 가장 격렬한 국면으로, 중동 평화의 가장 큰 걸림돌입니다.'
            },
            {
                id: 'sudan',
                title: '수단 내전',
                region: '아프리카',
                top: '52%',
                left: '55%',
                status: '수단 정규군(SAF)과 신속지원군(RSF)이라는 두 군벌 간의 권력 다툼으로 인해 발생했습니다. 수백만 명의 피란민이 발생하고 기근이 심화되는 등 세계 최악의 인도적 위기 중 하나로 꼽힙니다.',
                causes: ['군부 세력 간의 권력 장악권 다툼', '자원 통제권 확보', '민주주의 정부 이양 실패'],
                summary: '정치적 권력을 차지하려는 군벌 간의 싸움이 민간인들에게 극심한 고통을 주고 있는 사례입니다.'
            },
            {
                id: 'taiwan',
                title: '타이완 해협 긴장',
                region: '아시아',
                top: '44%',
                left: '82%',
                status: '중국이 타이완에 대한 영유권을 주장하며 군사적 압박을 강화하고 있습니다. 미국이 타이완을 지지하면서 미·중 패권 경쟁의 핵심 발화점이 되고 있습니다.',
                causes: ['중국의 "하나의 중국" 원칙', '타이완의 정체성 및 민주주의 수호', '전략적 요충지 및 반도체 공급망'],
                summary: '무력 충돌은 없으나 언제든지 세계 경제와 안보에 큰 충격을 줄 수 있는 잠재적 화약고입니다.'
            },
            {
                id: 'haiti',
                title: '아이티 치안 위기',
                region: '미주',
                top: '48%',
                left: '27%',
                status: '정부 기능이 마비된 틈을 타 무장 갱단들이 수도의 대부분을 장악했습니다. 극심한 폭력과 식량 부족으로 국가 시스템이 붕괴된 상태입니다.',
                causes: ['대통령 암살 이후 정치적 공백', '갱단의 세력 확장', '지속적인 경제 빈곤과 부패'],
                summary: '정부의 통제력이 상실되었을 때 사회가 얼마나 불안해질 수 있는지를 보여주는 비극적인 사례입니다.'
            }
        ];

        const markersLayer = document.getElementById('markersLayer');
        const emptyState = document.getElementById('emptyState');
        const contentState = document.getElementById('contentState');
        const infoPanel = document.getElementById('infoPanel');

        // 지도에 마커(핀) 생성
        function initMap() {
            conflicts.forEach(conflict => {
                const markerWrapper = document.createElement('div');
                markerWrapper.className = 'marker';
                markerWrapper.style.top = conflict.top;
                markerWrapper.style.left = conflict.left;
                markerWrapper.setAttribute('data-id', conflict.id);

                markerWrapper.innerHTML = `
                    <div class="marker-pulse"></div>
                    <i class="fa-solid fa-location-dot text-red-500 text-xl md:text-2xl"></i>
                `;

                markerWrapper.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showConflictInfo(conflict);
                    
                    // 활성화된 마커 스타일링
                    document.querySelectorAll('.marker i').forEach(i => i.classList.remove('active-marker'));
                    markerWrapper.querySelector('i').classList.add('active-marker');
                });

                markersLayer.appendChild(markerWrapper);
            });
        }

        // 정보 패널 내용 업데이트
        function showConflictInfo(data) {
            emptyState.classList.add('hidden');
            contentState.classList.remove('hidden');
            
            // 데이터 삽입
            document.getElementById('regionTag').textContent = data.region;
            document.getElementById('conflictTitle').textContent = data.title;
            document.getElementById('currentStatus').textContent = data.status;
            document.getElementById('summary').textContent = data.summary;

            // 원인 목록 생성
            const causesList = document.getElementById('mainCauses');
            causesList.innerHTML = '';
            data.causes.forEach(cause => {
                const li = document.createElement('li');
                li.textContent = cause;
                causesList.appendChild(li);
            });

            // 애니메이션 효과를 위해 패널 강조
            infoPanel.classList.add('ring-2', 'ring-blue-400');
            setTimeout(() => {
                infoPanel.classList.remove('ring-2', 'ring-blue-400');
            }, 500);
        }

        window.onload = initMap;
    </script>
</body>
</html>
